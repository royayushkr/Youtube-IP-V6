[server]
enableStaticServing = true

[client]
toolbarMode = "auto"

[[theme.fontFaces]]
family = "DMSans"
url = "static/DMSans-Regular.ttf"
style = "normal"
weight = 400

[[theme.fontFaces]]
family = "DMSans"
url = "static/DMSans-Medium.ttf"
style = "normal"
weight = 500

[[theme.fontFaces]]
family = "DMSans"
url = "static/DMSans-SemiBold.ttf"
style = "normal"
weight = 600

[[theme.fontFaces]]
family = "DMSans"
url = "static/DMSans-Bold.ttf"
style = "normal"
weight = 700

[[theme.fontFaces]]
family = "FiraCode"
url = "static/FiraCode-Regular.ttf"
style = "normal"
weight = 400

[[theme.fontFaces]]
family = "FiraCode"
url = "static/FiraCode-Medium.ttf"
style = "normal"
weight = 500

[theme]
base = "light"
primaryColor = "#FF0033"
backgroundColor = "#F5F5F7"
secondaryBackgroundColor = "#FFFFFF"
textColor = "#111216"
linkColor = "#0071E3"
borderColor = "#D1D5DB"
showWidgetBorder = true
baseRadius = "0.75rem"
font = "DMSans"
headingFont = "DMSans"
codeFont = "FiraCode"
codeBackgroundColor = "#F3F4F6"
showSidebarBorder = true

[theme.sidebar]
backgroundColor = "#FBFBFC"
secondaryBackgroundColor = "#F3F4F6"
